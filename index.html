<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track income and expenses easily with currency conversion and charts.">
    <title>Cash-Flow - Simple Wealth Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <i class="fa-solid fa-wallet logo-icon" aria-hidden="true"></i>
                <h1>Cash-Flow</h1>
            </div>
            <div class="header-controls">
                <label for="currency-selector" class="sr-only">Select Currency</label>
                <select id="currency-selector" class="currency-select">
                    <option value="USD">USD ($)</option>
                    <option value="INR" selected>INR (₹)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="GBP">GBP (£)</option>
                </select>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
                    <i id="sun-icon" class="fa-solid fa-sun theme-icon"></i>
                    <i id="moon-icon" class="fa-solid fa-moon theme-icon hidden"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <div id="alert-banner" class="alert-banner hidden" role="alert">
            <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
            <span>Warning: Your remaining balance is below 10% of your salary!</span>
        </div>

        <div class="dashboard-grid">
            <section class="grid-card control-panel">
                <h2 class="card-title">Financial Setup</h2>
                <form id="salary-form" class="data-form">
                    <div class="form-group">
                        <label for="salary-input">Total Monthly Salary</label>
                        <div class="input-wrapper">
                            <span class="currency-symbol" id="salary-symbol">₹</span>
                            <input type="number" id="salary-input" min="0" step="any" placeholder="0.00" required>
                        </div>
                        <span class="error-msg" id="salary-error"></span>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="primary-btn">Set Salary</button>
                        <button type="button" id="clear-salary-btn" class="danger-btn">Reset</button>
                    </div>
                </form>

                <hr class="divider">

                <h2 class="card-title">Add Expense</h2>
                <form id="expense-form" class="data-form">
                    <div class="form-group">
                        <label for="expense-name-input">Expense Name</label>
                        <input type="text" id="expense-name-input" placeholder="e.g., Rent, Groceries" required>
                        <span class="error-msg" id="expense-name-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="expense-amount-input">Expense Amount</label>
                        <div class="input-wrapper">
                            <span class="currency-symbol" id="expense-symbol">₹</span>
                            <input type="number" id="expense-amount-input" min="0" step="any" placeholder="0.00" required>
                        </div>
                        <span class="error-msg" id="expense-amount-error"></span>
                    </div>
                    <button type="submit" class="primary-btn">Log Expense</button>
                </form>
            </section>

            <section class="grid-card stats-panel">
                <h2 class="card-title">Financial Summary</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Income</h3>
                        <p class="stat-value" id="val-income">₹0.00</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Expenses</h3>
                        <p class="stat-value text-red" id="val-expenses">₹0.00</p>
                    </div>
                    <div class="stat-card">
                        <h3>Remaining Balance</h3>
                        <p class="stat-value text-green" id="val-balance">₹0.00</p>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="balance-chart" aria-label="Remaining Balance vs Total Expenses Chart" role="img"></canvas>
                </div>
            </section>

            <section class="grid-card ledger-panel">
                <div class="ledger-header">
                    <h2 class="card-title">Expense History</h2>
                    <div class="ledger-actions">
                        <button id="download-report" class="secondary-btn" aria-label="Download PDF report">
                            <i class="fa-solid fa-file-pdf" aria-hidden="true"></i> PDF
                        </button>
                        <button id="clear-expenses-btn" class="danger-btn" aria-label="Clear all expenses">Clear All</button>
                    </div>
                </div>
                
                <div class="list-wrapper">
                    <ul id="expense-list" class="expense-list"></ul>
                    <div id="no-expenses" class="no-data-msg">No expenses logged yet.</div>
                </div>
            </section>
        </div>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 Cash-Flow Tracker. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
